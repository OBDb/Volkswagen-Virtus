    description: "The Volkswagen Virtus is a subcompact sedan primarily designed for emerging markets, including South America, India, and parts of Asia. First introduced in Brazil in November 2017 (with sales starting January 2018), it's essentially the sedan version of the sixth-generation Polo, built on Volkswagen's MQB A0 platform (MQB A0 IN for India). The exterior features a clean, sophisticated design with a flowing roofline that transitions smoothly into a short deck lid, giving it more attractive proportions than many sedan derivatives of hatchbacks. The front end shares styling cues with the Polo, while the rear features distinctive wraparound taillights. Engine options vary by market but typically include 1.0-liter three-cylinder turbocharged engines, 1.5-liter four-cylinder engines, and 1.6-liter naturally aspirated four-cylinders in some regions, with power outputs ranging from approximately 85 to 150 horsepower. Transmission options generally include 5 or 6-speed manuals and 6-speed automatics or 7-speed DSG dual-clutch units. The interior is largely shared with the Polo, featuring a modern dashboard design centered around a touchscreen infotainment system, with digital instrumentation available on higher trims. A significant selling point is the spacious cabin and class-leading trunk space, making it practical as a family vehicle despite its compact exterior dimensions. In March 2022, the Virtus was introduced in India as a replacement for the Vento, featuring a facelifted appearance with revised dashboard design. In February 2023, the Brazil-market Virtus received a comprehensive restyling with updated exterior design and revised engine lineup. In June 2023, it was introduced in China as the Lavida XR. The Virtus has been particularly successful in Brazil and India, where it competes in the premium subcompact sedan segment."
